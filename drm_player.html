<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPD + ClearKey Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.min.js"></script>
  <style>
    body{margin:0;font-family:system-ui,Arial,sans-serif;background:#0b0b10;color:#e8e8f0}
    .wrap{max-width:980px;margin:24px auto;padding:0 16px}
    .card{background:#151524;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px}
    label{display:block;margin:10px 0 6px;font-weight:600}
    input,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:#0f0f1a;color:#fff}
    button{margin-top:12px;padding:10px 16px;border:0;border-radius:8px;background:#5a4bda;color:#fff;font-weight:600;cursor:pointer}
    video{width:100%;height:520px;background:#000;border-radius:12px;margin-top:16px}
    .hint{font-size:13px;color:#9aa0b4}
    .err{color:#ff758f;margin-top:10px;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>MPD (DASH) + ClearKey Player</h2>
      <label for="mpd">MPD URL</label>
      <input id="mpd" placeholder="https://example.com/master.mpd" />

      <label for="keys">ClearKey (KID:KEY)</label>
      <textarea id="keys" rows="3" placeholder="kid1:key1\nkid2:key2"></textarea>
      <div class="hint">Format: one per line as <b>kid:key</b>. Hex only, no dashes.</div>

      <button id="loadBtn">Load Video</button>
      <div class="err" id="err"></div>

      <video id="video" controls autoplay playsinline></video>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const errEl = document.getElementById('err');

    function parseKeys(input){
      const out = {};
      (input||'').split(/[\n,]+/).map(s=>s.trim()).filter(Boolean).forEach(line=>{
        const i=line.indexOf(':');
        if(i>0){
          const kid=line.slice(0,i).replace(/-/g,'').toLowerCase();
          const key=line.slice(i+1).replace(/-/g,'').toLowerCase();
          if(kid && key) out[kid]=key;
        }
      });
      return out;
    }

    async function initPlayer(mpdUrl, keyText){
      errEl.textContent='';
      if(!shaka.Player.isBrowserSupported()){
        errEl.textContent='Shaka Player not supported in this browser.';
        return;
      }
      const player = new shaka.Player(video);
      const clearKeys = parseKeys(keyText);
      if(Object.keys(clearKeys).length){
        player.configure({ drm: { clearKeys } });
      }
      try{
        await player.load(mpdUrl);
      }catch(e){
        errEl.textContent = 'Playback error: ' + (e?.message || e);
      }
    }

    document.getElementById('loadBtn').addEventListener('click', ()=>{
      const mpdUrl = document.getElementById('mpd').value.trim();
      const keyText = document.getElementById('keys').value.trim();
      if(!mpdUrl){ errEl.textContent='Please enter MPD URL.'; return; }
      initPlayer(mpdUrl, keyText);
    });
  </script>
</body>
</html>
